  <title>언어심리학 실험</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
  <style>
    body { background-color: #ffffff; }
    .jspsych-content { max-width: 800px; }
    .stimulus { font-size: 52px; font-weight: bold; margin: 40px 0; }
    .fixation { font-size: 52px; }
    .instructions { font-size: 20px; line-height: 1.8; text-align: left; }
    .key-guide { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 18px; }
    .jspsych-btn {
      font-size: 28px !important;
      padding: 20px 60px !important;
      margin: 10px 20px !important;
      border-radius: 12px !important;
      cursor: pointer !important;
      min-width: 160px !important;
    }
    .btn-animal { background-color: #4CAF50 !important; color: white !important; border: none !important; }
    .btn-food   { background-color: #FF9800 !important; color: white !important; border: none !important; }
  </style>

  {stimulus:'ant',     correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},

  {stimulus:'butterfly',correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'soup',    correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'cat',     correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'기러기',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'corn',    correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'rabbit',  correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'된장찌개',correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'jam',     correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},

const highFreqTrials = [
  {stimulus:'dog',     correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'mango',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'eagle',   correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'두더지',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'orange',  correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'삼겹살',  correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'bear',    correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'고슴도치',correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'sugar',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'치킨',    correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'deer',    correct_response:'동물',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'치타',    correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'tomato',  correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'국수',    correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'waffle',  correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'표범',    correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'yogurt',  correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'고래',    correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'butter',  correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'밥',      correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'fig',     correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'원숭이',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'pear',    correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'잡채',    correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'plum',    correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'다람쥐',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'pie',     correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'개구리',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'toast',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'순대',    correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'bagel',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'두루미',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'donut',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'갈비',    correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'chocolate',correct_response:'음식',category:'food', language:'english',trial_type:'stay'},
  {stimulus:'코뿔소',  correct_response:'동물',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'pizza',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'불고기',  correct_response:'음식',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'apple',   correct_response:'음식',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'아이스크림',correct_response:'음식',category:'food',language:'korean', trial_type:'switch'},
];

const jsPsych = initJsPsych({
  on_finish: function() {
    const data = jsPsych.data.get().filter({task: 'trial'}).csv();
    const blob = new Blob([data], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const pid = jsPsych.data.get().values()[0]?.participant_id || 'participant';
    a.download = `data_${pid}.csv`;
    a.click();
    document.body.innerHTML = '<div style="text-align:center;margin-top:200px;font-size:24px;font-family:sans-serif;">실험이 끝났습니다.<br>참여해주셔서 감사합니다.<br><br>데이터가 자동 저장됩니다.</div>';
  }
});

const participantId = {
  type: jsPsychSurveyText,
  questions: [{prompt: '이름 또는 학번을 입력해주세요:', name: 'participant_id', required: true}],
  on_finish: function(data) {
    jsPsych.data.addProperties({participant_id: data.response.participant_id});
  }
};

const instructions = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="instructions">
      <h2 style="text-align:center;">어휘 처리 속도 측정 실험</h2>
      <p>화면에 단어가 나타나면 해당 단어가 어느 범주에 속하는지 <strong>최대한 빠르고 정확하게</strong> 버튼을 눌러 판단해주세요.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong>이면 → 초록색 <strong>동물</strong> 버튼<br>
        🍎 <strong>음식</strong>이면 → 주황색 <strong>음식</strong> 버튼
      </div>
      <p>틀려도 괜찮으니 최대한 빠르게 반응해주세요.</p>
    </div>
  `,
  choices: ['시작하기'],
};

const practiceInstr = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="instructions">
      <h2 style="text-align:center;">연습 시행</h2>
      <p>본 실험 전 연습 시행을 진행합니다.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong> → 초록 버튼 &nbsp;&nbsp; 🍎 <strong>음식</strong> → 주황 버튼
      </div>
    </div>
  `,
  choices: ['연습 시작'],
};

const practiceDone = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="instructions" style="text-align:center;">
      <h2>연습이 끝났습니다.</h2>
      <p>이제 본 실험을 시작합니다.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong> → 초록 버튼 &nbsp;&nbsp; 🍎 <strong>음식</strong> → 주황 버튼
      </div>
    </div>
  `,
  choices: ['본 실험 시작'],
};

const breakScreen = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="instructions" style="text-align:center;">
      <h2>첫 번째 블록이 끝났습니다.</h2>
      <p>충분히 준비되셨으면 계속 버튼을 눌러주세요.</p>
    </div>
  `,
  choices: ['계속하기'],
};

function makeFixation() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div class="fixation">+</div>',
    choices: [],
    trial_duration: 500,
  };
}

function makeTrial(trialData, blockName) {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `<div class="stimulus">${trialData.stimulus}</div>`,
    choices: ['동물', '음식'],
    button_html: [
      '<button class="jspsych-btn btn-animal">%choice%</button>',
      '<button class="jspsych-btn btn-food">%choice%</button>'
    ],
    data: {
      task: 'trial',
      stimulus: trialData.stimulus,
      correct_response: trialData.correct_response,
      category: trialData.category,
      language: trialData.language,
      trial_type: trialData.trial_type,
      block: blockName,
    },
    on_finish: function(data) {
      const response = data.response === 0 ? '동물' : '음식';
      data.correct = response === data.correct_response;
      data.response_label = response;
    }
  };
}

function makeBlock(trials, blockName) {
  const block = [];
  for (const t of trials) {
    block.push(makeFixation());
    block.push(makeTrial(t, blockName));
  }
  return block;
}

const counterbalanceOrder = Math.random() < 0.5 ? 'low_first' : 'high_first';
jsPsych.data.addProperties({order: counterbalanceOrder});

const timeline = [];
timeline.push(participantId);
timeline.push(instructions);
timeline.push(practiceInstr);
timeline.push(...makeBlock(practiceTrials, 'practice'));
timeline.push(practiceDone);

if (counterbalanceOrder === 'low_first') {
  timeline.push(...makeBlock(lowFreqTrials, 'low_frequency'));
  timeline.push(breakScreen);
  timeline.push(...makeBlock(highFreqTrials, 'high_frequency'));
} else {
  timeline.push(...makeBlock(highFreqTrials, 'high_frequency'));
  timeline.push(breakScreen);
  timeline.push(...makeBlock(lowFreqTrials, 'low_frequency'));
}

jsPsych.run(timeline);
</script>
</body>
</html>
