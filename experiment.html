<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>언어심리학 실험</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: sans-serif; 
      background: #fff; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh;
      padding: 20px;
    }
    #screen { width: 100%; max-width: 700px; text-align: center; }
    .stimulus { font-size: 56px; font-weight: bold; margin: 40px 0; min-height: 80px; }
    .fixation { font-size: 56px; margin: 40px 0; }
    .instructions { font-size: 20px; line-height: 1.8; text-align: left; }
    .key-guide { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 15px 0; font-size: 18px; }
    .next-btn { background: #007AFF; color: white; border: none; border-radius: 10px; padding: 15px 40px; font-size: 20px; cursor: pointer; margin-top: 20px; }
    #name-input { font-size: 20px; padding: 10px; border: 2px solid #ccc; border-radius: 8px; width: 80%; margin: 15px 0; }
    #progress { font-size: 14px; color: #999; margin-top: 10px; }
    /* 자극 화면 전용 숨겨진 input */
    .trial-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
<div id="screen"></div>

let results = [];
let currentPhase = 'name';
let currentBlock = [];
let currentTrialIndex = 0;
let currentBlockName = '';
let trialStartTime = 0;
let order = Math.random() < 0.5 ? 'low_first' : 'high_first';

  {stimulus:'거북이',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'lemon',   correct:'j',language:'english',trial_type:'stay'},

  {stimulus:'cat',     correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'기러기',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'corn',    correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'rabbit',  correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'된장찌개',correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'jam',     correct:'j',language:'english',trial_type:'stay'},
];

const highFreqTrials = [
  {stimulus:'dog',     correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'mango',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'eagle',   correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'두더지',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'orange',  correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'삼겹살',  correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'bear',    correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'고슴도치',correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'sugar',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'치킨',    correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'deer',    correct:'f',language:'english',trial_type:'stay'},
  {stimulus:'치타',    correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'tomato',  correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'국수',    correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'waffle',  correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'표범',    correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'yogurt',  correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'고래',    correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'butter',  correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'밥',      correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'fig',     correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'원숭이',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'pear',    correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'잡채',    correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'plum',    correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'다람쥐',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'pie',     correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'개구리',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'toast',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'순대',    correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'bagel',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'두루미',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'donut',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'갈비',    correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'chocolate',correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'코뿔소',  correct:'f',language:'korean', trial_type:'switch'},
  {stimulus:'pizza',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'불고기',  correct:'j',language:'korean', trial_type:'switch'},
  {stimulus:'apple',   correct:'j',language:'english',trial_type:'stay'},
  {stimulus:'아이스크림',correct:'j',language:'korean',trial_type:'switch'},
];

const scr = document.getElementById('screen');

function getInput() {
  return document.getElementById('trial-input');
}

function focusInput() {
  const inp = getInput();
  if (inp) inp.focus();
}

function showName() {
  currentPhase = 'name';
  scr.innerHTML = `
    <div class="instructions">
      <h2 style="text-align:center; margin-bottom:20px;">언어심리학 실험</h2>
      <p>이름 또는 학번을 입력해주세요:</p>
      <input id="name-input" type="text" placeholder="이름/학번 입력">
      <br>
      <button class="next-btn" onclick="submitName()">다음</button>
    </div>
  `;
  document.getElementById('name-input').focus();
}

function submitName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { alert('이름을 입력해주세요'); return; }
  participantId = val;
  showInstructions();
}

function makeTrialInput(onKey) {
  return `<input id="trial-input" class="trial-input" type="text" 
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
}

function showInstructions() {
  currentPhase = 'instructions';
  scr.innerHTML = `
    ${makeTrialInput()}
    <div class="instructions">
      <h2 style="text-align:center;">어휘 처리 속도 측정 실험</h2>
      <p style="margin-top:15px;">화면에 단어가 나타나면 해당 단어가 어느 범주에 속하는지 <strong>최대한 빠르고 정확하게</strong> 판단해주세요.</p>
      <div class="key-guide" style="margin-top:15px;">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p style="color:#666; margin-top:15px;">아무 키나 눌러 계속하세요</p>
    </div>
  `;
  setupInput(() => showPracticeInstr());
  setTimeout(focusInput, 100);
}

function showPracticeInstr() {
  currentPhase = 'practiceInstr';
  scr.innerHTML = `
    ${makeTrialInput()}
    <div class="instructions">
      <h2 style="text-align:center;">연습 시행</h2>
      <p style="margin-top:15px;">본 실험 전 연습 시행을 진행합니다.</p>
      <div class="key-guide" style="margin-top:15px;">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p style="color:#666; margin-top:15px;">아무 키나 눌러 시작하세요</p>
    </div>
  `;
  setupInput(() => startBlock(practiceTrials, 'practice', 'practice'));
  setTimeout(focusInput, 100);
}

function showPracticeDone() {
  currentPhase = 'practiceDone';
  scr.innerHTML = `
    ${makeTrialInput()}
    <div class="instructions" style="text-align:center;">
      <h2>연습이 끝났습니다.</h2>
      <p style="margin-top:15px;">이제 본 실험을 시작합니다.</p>
      <div class="key-guide" style="margin-top:15px;">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p style="color:#666; margin-top:15px;">아무 키나 눌러 시작하세요</p>
    </div>
  `;
  const firstBlock = order === 'low_first' ? lowFreqTrials : highFreqTrials;
  const firstName = order === 'low_first' ? 'low_frequency' : 'high_frequency';
  setupInput(() => startBlock(firstBlock, firstName, 'mainA'));
  setTimeout(focusInput, 100);
}

function showBreak() {
  currentPhase = 'break';
  scr.innerHTML = `
    ${makeTrialInput()}
    <div class="instructions" style="text-align:center;">
      <h2>첫 번째 블록이 끝났습니다.</h2>
      <p style="margin-top:15px;">충분히 준비되셨으면 아무 키나 눌러 계속해주세요.</p>
    </div>
  `;
  const secondBlock = order === 'low_first' ? highFreqTrials : lowFreqTrials;
  const secondName = order === 'low_first' ? 'high_frequency' : 'low_frequency';
  setupInput(() => startBlock(secondBlock, secondName, 'mainB'));
  setTimeout(focusInput, 100);
}

function showEnd() {
  scr.innerHTML = `
    <div class="instructions" style="text-align:center;">
      <h2>실험이 끝났습니다.</h2>
      <p style="margin-top:15px;">참여해주셔서 감사합니다.</p>
      <button class="next-btn" onclick="saveData()" style="margin-top:20px;">데이터 저장</button>
    </div>
  `;
}

function saveData() {
  const header = 'participant_id,order,block,trial_index,stimulus,language,trial_type,response,correct,rt\n';
  const rows = results.map(r =>
    `${r.pid},${r.order},${r.block},${r.trial_index},${r.stimulus},${r.language},${r.trial_type},${r.response},${r.correct},${r.rt}`
  ).join('\n');
  const blob = new Blob([header + rows], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `data_${participantId}.csv`;
  a.click();
}

function setupInput(anyKeyCallback) {
  const inp = getInput();
  if (!inp) return;
  inp.addEventListener('keydown', function handler(e) {
    e.preventDefault();
    inp.removeEventListener('keydown', handler);
    anyKeyCallback();
  });
}

function startBlock(trials, blockName, phase) {
  currentBlock = trials;
  currentBlockName = blockName;
  currentTrialIndex = 0;
  currentPhase = phase;
  showFixation();
}

function showFixation() {
  scr.innerHTML = `<div class="fixation">+</div>`;
  setTimeout(showTrial, 500);
}

function showTrial() {
  if (currentTrialIndex >= currentBlock.length) {
    if (currentPhase === 'practice') {
      showPracticeDone();
    } else if (currentPhase === 'mainA') {
      showBreak();
    } else {
      showEnd();
    }
    return;
  }

  const trial = currentBlock[currentTrialIndex];
  const total = currentBlock.length;
  trialStartTime = performance.now();

  scr.innerHTML = `
    <input id="trial-input" class="trial-input" type="text"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="stimulus">${trial.stimulus}</div>
    <div id="progress">${currentTrialIndex + 1} / ${total}</div>
  `;

  const inp = document.getElementById('trial-input');
  
  // 즉시 포커스
  inp.focus();
  
  // 혹시 포커스 안 되면 재시도
  setTimeout(() => { if (inp) inp.focus(); }, 50);
  setTimeout(() => { if (inp) inp.focus(); }, 150);

  inp.addEventListener('keydown', function handler(e) {
    e.preventDefault();
    const key = e.key.toLowerCase();
    if (key !== 'f' && key !== 'j') {
      // f/j 아닌 키는 무시하되 포커스 유지
      inp.focus();
      return;
    }
    inp.removeEventListener('keydown', handler);
    const rt = Math.round(performance.now() - trialStartTime);
    results.push({
      pid: participantId,
      order: order,
      block: currentBlockName,
      trial_index: currentTrialIndex,
      stimulus: trial.stimulus,
      language: trial.language,
      trial_type: trial.trial_type,
      response: key,
      correct: key === trial.correct ? 1 : 0,
      rt: rt,
    });
    currentTrialIndex++;
    showFixation();
  });
}

// 화면 터치시 포커스 복구
document.addEventListener('touchend', function() {
  setTimeout(() => {
    const inp = getInput();
    if (inp) inp.focus();
  }, 50);
});

showName();
</script>
</body>
</html>
