// 고빈도 블록 (영어 21 + 한국어 19)
const highFreqTrials = [
  {stimulus:'dog',     correct_key:'f',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'mango',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},

  {stimulus:'bear',    correct_key:'f',category:'animal',language:'english',trial_type:'stay'},
  {stimulus:'고슴도치',correct_key:'f',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'sugar',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'치킨',    correct_key:'j',category:'food',  language:'korean', trial_type:'switch'},

  {stimulus:'tomato',  correct_key:'j',category:'food',  language:'english',trial_type:'stay'},

  {stimulus:'원숭이',  correct_key:'f',category:'animal',language:'korean', trial_type:'switch'},

  {stimulus:'개구리',  correct_key:'f',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'toast',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'순대',    correct_key:'j',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'bagel',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'두루미',  correct_key:'f',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'donut',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'갈비',    correct_key:'j',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'chocolate',correct_key:'j',category:'food', language:'english',trial_type:'stay'},
  {stimulus:'코뿔소',  correct_key:'f',category:'animal',language:'korean', trial_type:'switch'},
  {stimulus:'pizza',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'불고기',  correct_key:'j',category:'food',  language:'korean', trial_type:'switch'},
  {stimulus:'apple',   correct_key:'j',category:'food',  language:'english',trial_type:'stay'},
  {stimulus:'아이스크림',correct_key:'j',category:'food', language:'korean', trial_type:'switch'},
];

// ============================================
// jsPsych 실험 설정
// ============================================

const jsPsych = initJsPsych({
  on_finish: function() {
    // 실험 완료 후 데이터 저장
    const data = jsPsych.data.get().filter({trial_type: 'html-keyboard-response'}).csv();
    const blob = new Blob([data], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const pid = jsPsych.data.get().first(1).values()[0].participant_id || 'participant';
    a.download = `data_${pid}.csv`;
    a.click();
    document.body.innerHTML = '<div style="text-align:center; margin-top:200px; font-size:24px; font-family:sans-serif;">실험이 끝났습니다. 참여해주셔서 감사합니다.<br><br>데이터가 자동으로 저장됩니다.</div>';
  }
});

// 참가자 ID 입력
const participantId = {
  type: jsPsychSurveyText,
  questions: [{prompt: '이름 또는 학번을 입력해주세요:', name: 'participant_id', required: true}],
  on_finish: function(data) {
    const pid = data.response.participant_id;
    jsPsych.data.addProperties({participant_id: pid});
  }
};

// 전체 안내
const instructions = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instructions">
      <h2 style="text-align:center;">어휘 처리 속도 측정 실험</h2>
      <p>화면에 단어가 나타나면 해당 단어가 어느 범주에 속하는지 <strong>최대한 빠르고 정확하게</strong> 판단해주세요.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p>틀려도 괜찮으니 최대한 빠르게 반응해주세요.</p>
      <p style="text-align:center; color:#666;">아무 키나 눌러 계속하세요</p>
    </div>
  `,
  choices: "ALL_KEYS"
};

// 연습 안내
const practiceInstr = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instructions">
      <h2 style="text-align:center;">연습 시행</h2>
      <p>본 실험 전 연습 시행을 진행합니다.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p style="text-align:center; color:#666;">아무 키나 눌러 시작하세요</p>
    </div>
  `,
  choices: "ALL_KEYS"
};

// 연습 완료 안내
const practiceDone = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instructions" style="text-align:center;">
      <h2>연습이 끝났습니다.</h2>
      <p>이제 본 실험을 시작합니다.</p>
      <div class="key-guide">
        🐾 <strong>동물</strong>이면 → <strong>F 키</strong><br>
        🍎 <strong>음식</strong>이면 → <strong>J 키</strong>
      </div>
      <p style="color:#666;">아무 키나 눌러 시작하세요</p>
    </div>
  `,
  choices: "ALL_KEYS"
};

// 휴식 안내
const breakScreen = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="instructions" style="text-align:center;">
      <h2>첫 번째 블록이 끝났습니다.</h2>
      <p>충분히 준비되셨으면 아무 키나 눌러 계속해주세요.</p>
    </div>
  `,
  choices: "ALL_KEYS"
};

// 고정점
function makeFixation() {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="fixation">+</div>',
    choices: "NO_KEYS",
    trial_duration: 500,
  };
}

// 자극 시행
function makeTrial(trialData, blockName) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `<div class="stimulus">${trialData.stimulus}</div>`,
    choices: ['f', 'j'],
    data: {
      stimulus: trialData.stimulus,
      correct_key: trialData.correct_key,
      category: trialData.category,
      language: trialData.language,
      trial_type: trialData.trial_type,
      block: blockName,
    },
    on_finish: function(data) {
      data.correct = data.response === data.correct_key;
    }
  };
}

// 블록 생성
function makeBlock(trials, blockName) {
  const block = [];
  for (const t of trials) {
    block.push(makeFixation());
    block.push(makeTrial(t, blockName));
  }
  return block;
}

// Counterbalancing: 참가자 번호로 순서 결정
const counterbalanceOrder = Math.random() < 0.5 ? 'low_first' : 'high_first';
jsPsych.data.addProperties({order: counterbalanceOrder});

// 전체 타임라인 구성
const timeline = [];

timeline.push(participantId);
timeline.push(instructions);
timeline.push(practiceInstr);
timeline.push(...makeBlock(practiceTrials, 'practice'));
timeline.push(practiceDone);

if (counterbalanceOrder === 'low_first') {
  timeline.push(...makeBlock(lowFreqTrials, 'low_frequency'));
  timeline.push(breakScreen);
  timeline.push(...makeBlock(highFreqTrials, 'high_frequency'));
} else {
  timeline.push(...makeBlock(highFreqTrials, 'high_frequency'));
  timeline.push(breakScreen);
  timeline.push(...makeBlock(lowFreqTrials, 'low_frequency'));
}

jsPsych.run(timeline);
</script>
